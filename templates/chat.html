<!DOCTYPE html>
<html>

<head>
    <title>Sim Carma Chatbot</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.5.0/css/all.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='style.css')}}" />

    <style>
        body,
        html {
            height: 100%;
            margin: 0;
            background: rgb(0, 60, 77);
            background: -webkit-linear-gradient(to right, rgb(0, 60, 77), rgb(0, 102, 128));
            background: linear-gradient(to right, rgb(0, 60, 77), rgb(0, 102, 128));
        }
    </style>
</head>

<body>
    <div class="container-fluid h-100">
        <div class="row justify-content-center h-100">
            <div class="col-md-8 col-xl-6 chat">
                <div class="card">
                    <div class="card-header msg_head">
                        <div class="d-flex bd-highlight">
                            <div class="img_cont">
                                <img src="https://i.ibb.co/WNdHr2mf/photo-2024-12-06-06-34-35.jpg"
                                    class="rounded-circle user_img">
                                <span class="online_icon"></span>
                            </div>
                            <div class="user_info">
                                <span>Murphy</span>
                                <p>Make your soft skills better</p>
                                <button id="muteButton" class="mute_button"><i class="fas fa-volume-up"></i></button>
                            </div>
                        </div>
                    </div>

                    <!-- CHATBOX -->
                    <div id="messageFormeight" class="card-body msg_card_body">
                        {% if initial_question %}
                        <div class="d-flex justify-content-start mb-4">
                            <div class="img_cont_msg">
                                <img src="https://i.ibb.co/WNdHr2mf/photo-2024-12-06-06-34-35.jpg"
                                    class="rounded-circle user_img_msg">
                            </div>
                            <div class="msg_cotainer">
                                {{ initial_question }}
                                <span class="msg_time">{{ "%02d:%02d" | format(now.hour, now.minute) }}</span>
                            </div>
                        </div>
                        {% endif %}
                    </div>

                    <div class="card-footer">
                        <form id="messageArea" class="input-group">
                            <input type="text" id="text" name="msg" placeholder="Type your message..."
                                autocomplete="off" class="form-control type_msg" required />
                            <div class="input-group-append">
                                <button type="button" id="voiceRecord" class="input-group-text voice_record_btn"><i
                                        class="fas fa-microphone"></i></button>
                                <button type="submit" id="send" class="input-group-text send_btn"><i
                                        class="fas fa-location-arrow"></i></button>
                                <button type="button" id="restart" class="input-group-text restart_btn"><i
                                        class="fas fa-sync-alt"></i></button>
                            </div>
                        </form>

                        <script>
                            document.getElementById("voiceRecord").addEventListener("mousedown", startRecording);
                            document.getElementById("voiceRecord").addEventListener("mouseup", stopRecording);
                            let recognition = null;
                            let recognizing = false;

                            function startRecording() {
                                recognition = new window.webkitSpeechRecognition();
                                recognition.onresult = function (event) {
                                    const text = event.results[0][0].transcript;
                                    document.getElementById("text").value = text;
                                };
                                recognition.start();
                                recognizing = true;
                            }

                            function stopRecording() {
                                if (recognizing) {
                                    recognition.stop();
                                    recognizing = false;
                                }
                            }
                        </script>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        $(document).ready(function () {
            $("#messageArea").on("submit", function (event) {
                const date = new Date();
                const hour = date.getHours();
                const minute = date.getMinutes();
                const str_time = hour + ":" + (minute < 10 ? "0" + minute : minute);
                var rawText = $("#text").val();

                var userHtml = '<div class="d-flex justify-content-end mb-4"><div class="msg_cotainer_send">' + rawText + '<span class="msg_time_send">' + str_time + '</span></div><div class="img_cont_msg"><img src="https://i.ibb.co/d5b84Xw/Untitled-design.png" class="rounded-circle user_img_msg"></div></div>';

                $("#text").val("");
                $("#messageFormeight").append(userHtml);

                $.ajax({
                    data: { msg: rawText },
                    type: "POST",
                    url: "/get",
                }).done(function (data) {
                    var botResponse = data;
                    var botHtml = '<div class="d-flex justify-content-start mb-4"><div class="img_cont_msg"><img src="https://i.ibb.co/F413rbVb/photo-2025-05-09-01-48-46.jpg" class="rounded-circle user_img_msg"></div><div class="msg_cotainer">' + botResponse + '<span class="msg_time">' + str_time + '</span></div></div>';

                    if (isYouTubeLink(botResponse)) {
                        var videoId = extractYouTubeVideoId(botResponse);
                        var embeddedVideoHtml = '<div class="embedded-video-container"><iframe width="560" height="315" src="https://www.youtube.com/embed/' + videoId + '" frameborder="0" allowfullscreen></iframe></div>';
                        $("#messageFormeight").append(embeddedVideoHtml);
                    } else {
                        $("#messageFormeight").append($.parseHTML(botHtml));
                    }

                    speak(botResponse);
                });

                event.preventDefault();
            });
        });

        function speak(text) {
            if (!isMuted) {
                var utterance = new SpeechSynthesisUtterance(text);
                window.speechSynthesis.speak(utterance);
            }
        }

        function isYouTubeLink(text) {
            return text.match(/(?:https?:\/\/)?(?:www\.)?(?:youtube\.com\/(?:[^\/\n\s]+\/\S+\/|(?:v|e(?:mbed)?)\/|\S*?[?&]v=)|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
        }

        function extractYouTubeVideoId(text) {
            var match = text.match(/(?:https?:\/\/)?(?:www\.)?(?:youtube\.com\/(?:[^\/\n\s]+\/\S+\/|(?:v|e(?:mbed)?)\/|\S*?[?&]v=)|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
            return match ? match[1] : null;
        }

        let utterance = null;
        let isMuted = false;

        function toggleMute() {
            isMuted = !isMuted;
            const muteButtonIcon = document.getElementById('muteButton').querySelector('i');

            if (isMuted) {
                muteButtonIcon.classList.remove('fa-volume-up');
                muteButtonIcon.classList.add('fa-volume-off');
                if (utterance) window.speechSynthesis.pause();
            } else {
                muteButtonIcon.classList.remove('fa-volume-off');
                muteButtonIcon.classList.add('fa-volume-up');
                if (utterance) window.speechSynthesis.resume();
            }
        }

        document.getElementById('muteButton').addEventListener('click', toggleMute);

        document.getElementById('restart').addEventListener('click', function () {
            fetch('/restart')
                .then(response => {
                    if (response.ok) location.reload();
                })
                .catch(error => console.error('Error restarting:', error));
        });
    </script>
</body>

</html>
